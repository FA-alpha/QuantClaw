<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantClaw - 量化交易助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #161b22;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #30363d;
        }
        .logo { font-size: 1.5em; }
        .header h1 { font-size: 1.1em; color: #58a6ff; font-weight: 600; }
        .status {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }
        .status.new { background: #238636; }
        .status.auth { background: #1f6feb; }
        .user-info { font-size: 0.8em; color: #8b949e; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #238636;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: #1f6feb22;
            color: #58a6ff;
            font-size: 0.85em;
            border: 1px solid #1f6feb44;
        }
        .message.error {
            background: #f8514922;
            color: #f85149;
            border: 1px solid #f8514944;
        }
        .message .time {
            font-size: 0.7em;
            color: #8b949e;
            margin-top: 6px;
        }

        .input-area {
            background: #161b22;
            padding: 16px 20px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 1em;
            outline: none;
        }
        .input-area input:focus { border-color: #58a6ff; }
        .input-area input::placeholder { color: #484f58; }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #238636;
            color: #fff;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #2ea043; }
        .input-area button:disabled { background: #21262d; cursor: not-allowed; }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        .welcome h2 { color: #58a6ff; margin-bottom: 16px; font-size: 1.5em; }
        .welcome p { margin-bottom: 8px; }
        .welcome .examples {
            margin-top: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .welcome .example {
            padding: 8px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .welcome .example:hover {
            background: #30363d;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">📈</span>
        <h1>QuantClaw</h1>
        <span id="status" class="status new">新用户</span>
        <span id="userInfo" class="user-info"></span>
    </div>

    <div id="chat" class="chat-container">
        <div class="welcome">
            <h2>👋 欢迎使用 QuantClaw</h2>
            <p>我是您的量化交易助手，可以帮您分析市场、制定策略。</p>
            <p>试试问我：</p>
            <div class="examples">
                <span class="example" onclick="askExample(this)">查询 BTC 价格</span>
                <span class="example" onclick="askExample(this)">分析 ETH 近期走势</span>
                <span class="example" onclick="askExample(this)">设计一个网格策略</span>
                <span class="example" onclick="askExample(this)">最近有什么大户动向</span>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="input" placeholder="输入量化相关问题..." onkeypress="handleKeyPress(event)">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const TOKEN_KEY = 'quantclaw_token';
        const API_URL = '/api/chat';
        const WS_URL = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';

        let token = localStorage.getItem(TOKEN_KEY);
        let userId = null;
        let agentId = null;
        let sessionKey = null;
        let ws = null;
        let pendingMessage = null;

        // 初始化
        async function init() {
            if (!token) {
                token = 'device_' + crypto.randomUUID();
                localStorage.setItem(TOKEN_KEY, token);
                document.getElementById('status').textContent = '新用户';
                document.getElementById('status').className = 'status new';
            } else {
                document.getElementById('status').textContent = '已认证';
                document.getElementById('status').className = 'status auth';
                
                // 已有 token，尝试认证并加载历史
                try {
                    const resp = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                    const data = await resp.json();
                    
                    if (data.success) {
                        userId = data.userId;
                        agentId = data.agentId;
                        sessionKey = data.sessionKey;
                        document.getElementById('userInfo').textContent = userId || '';
                        
                        // 加载本地历史
                        await loadLocalHistory();
                        
                        // 连接 WebSocket
                        connectWebSocket();
                    }
                } catch (e) {
                    console.error('Auth failed:', e);
                }
            }
        }

        // WebSocket 连接
        function connectWebSocket(onReady) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                if (onReady) onReady();
                return;
            }

            ws = new WebSocket(WS_URL + '?sessionKey=' + encodeURIComponent(sessionKey) + '&userId=' + encodeURIComponent(userId));
            
            ws.onopen = () => {
                console.log('WS connected');
                document.getElementById('status').textContent = '已连接';
                document.getElementById('status').className = 'status auth';
                if (onReady) onReady();
            };

            let streamingMsg = null;  // 当前流式消息元素
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    console.log('WS message:', data);
                    
                    if (data.type === 'history') {
                        loadHistory(data.messages || []);
                    } else if (data.type === 'stream') {
                        // 流式响应
                        if (!streamingMsg) {
                            streamingMsg = createStreamingMessage();
                        }
                        streamingMsg.textContent = data.text || '';
                        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                    } else if (data.type === 'done') {
                        // 流式结束
                        if (streamingMsg) {
                            const time = document.createElement('div');
                            time.className = 'time';
                            time.textContent = new Date().toLocaleTimeString();
                            streamingMsg.appendChild(time);
                            streamingMsg = null;
                        }
                    } else if (data.type === 'message' && data.final) {
                        // 最终消息（如果没收到流式）
                        if (!streamingMsg) {
                            addMessage(data.text, 'assistant');
                        }
                        streamingMsg = null;
                    } else if (data.type === 'error') {
                        addMessage('❌ ' + (data.error?.message || data.error || 'Error'), 'error');
                        streamingMsg = null;
                    }
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };

            ws.onerror = (err) => {
                console.error('WS error:', err);
                addMessage('❌ WebSocket 连接错误', 'error');
            };

            ws.onclose = () => {
                console.log('WS closed');
                ws = null;
            };
        }

        // 通过 WebSocket 发送消息
        function sendViaWebSocket(message) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWebSocket(() => sendViaWebSocket(message));
                return;
            }
            ws.send(JSON.stringify({ type: 'message', text: message }));
        }

        // 从服务端加载本地历史
        async function loadLocalHistory() {
            try {
                const resp = await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await resp.json();
                
                if (data.success && data.messages && data.messages.length > 0) {
                    loadHistory(data.messages);
                }
            } catch (e) {
                console.error('Load history failed:', e);
            }
        }

        // 提取消息文本
        function extractText(content) {
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) {
                return content
                    .filter(c => c.type === 'text')
                    .map(c => c.text || '')
                    .join('');
            }
            return content?.text || '';
        }

        // 加载历史消息
        function loadHistory(messages) {
            const chat = document.getElementById('chat');
            // 移除欢迎界面
            const welcome = chat.querySelector('.welcome');
            if (welcome) welcome.remove();
            
            // 清空现有消息
            chat.innerHTML = '';
            
            // 按时间顺序添加历史消息
            messages.forEach(msg => {
                const role = msg.role || 'assistant';
                // content 可能是字符串或数组
                const text = typeof msg.content === 'string' ? msg.content : extractText(msg.content);
                if (text) {
                    addMessage(text, role, false);
                }
            });
            
            if (messages.length > 0) {
                addMessage(`📜 已加载 ${messages.length} 条历史消息`, 'system', false);
            }
            
            chat.scrollTop = chat.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage(message, 'user');

            // 移除欢迎界面
            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, message })
                });

                const data = await resp.json();

                if (data.success) {
                    userId = data.userId;
                    agentId = data.agentId;
                    sessionKey = data.sessionKey;

                    if (data.isNewUser) {
                        addMessage('🎉 已为您创建专属量化助手！', 'system');
                    }
                    document.getElementById('status').textContent = '已认证';
                    document.getElementById('status').className = 'status auth';
                    document.getElementById('userInfo').textContent = userId || '';

                    // 通过 WebSocket 发送消息获取回复
                    sendViaWebSocket(message);

                } else {
                    addMessage('❌ ' + (data.error || '发送失败'), 'error');
                }

            } catch (err) {
                addMessage('❌ 网络错误: ' + err.message, 'error');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        // 添加消息到聊天
        function addMessage(text, type, scroll = true) {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = 'message ' + type;
            msg.textContent = text;
            
            const time = document.createElement('div');
            time.className = 'time';
            time.textContent = new Date().toLocaleTimeString();
            msg.appendChild(time);
            
            chat.appendChild(msg);
            if (scroll) chat.scrollTop = chat.scrollHeight;
        }

        // 创建流式消息元素
        function createStreamingMessage() {
            const chat = document.getElementById('chat');
            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.textContent = '...';
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
            return msg;
        }

        // 示例问题
        function askExample(el) {
            document.getElementById('input').value = el.textContent;
            sendMessage();
        }

        // 回车发送
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // 清除 token（调试用）
        function clearToken() {
            localStorage.removeItem(TOKEN_KEY);
            token = null;
            document.getElementById('status').textContent = '新用户';
            document.getElementById('status').className = 'status new';
            document.getElementById('userInfo').textContent = '';
        }

        init();
    </script>
</body>
</html>
